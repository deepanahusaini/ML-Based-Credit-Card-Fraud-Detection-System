<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .box { width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 8px; margin: 6px 0; }
        button { padding: 10px; background: #007bff; color: white; border: none; width: 100%; cursor: pointer; }
        button:hover { background: #0056b3; }
        h2 { text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>Fraud Detection System</h2>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if result %}
        <p style="color: green; font-weight: bold;">Prediction: {{ result }}</p>
    {% endif %}

    <form method="POST">

        <input type="text" name="merchant" placeholder="Merchant Name" required>
        <input type="text" name="category" placeholder="Category" required>
        <input type="number" step="0.01" name="amt" placeholder="Transaction Amount" required>

        <input type="number" step="0.000001" name="lat" placeholder="Latitude">
        <input type="number" step="0.000001" name="long" placeholder="Longitude">
        <input type="number" step="0.000001" name="merch_lat" placeholder="Merchant Latitude">
        <input type="number" step="0.000001" name="merch_long" placeholder="Merchant Longitude">

        <input type="number" name="hour" min="0" max="23" placeholder="Hour (0-23)">
        <input type="number" name="day" min="1" max="31" placeholder="Day (1-31)">
        <input type="number" name="month" min="1" max="12" placeholder="Month (1-12)">

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="text" name="cc_num" placeholder="Credit Card Number" required>

        <button type="submit">Check for Fraud</button>
    </form>
</div>

</body>
</html>
